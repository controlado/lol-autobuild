version: 2

project_name: lol-autobuild

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: lol-autobuild
    main: ./cmd/lol-autobuild
    binary: lol-autobuild
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/controlado/lol-autobuild/internal/buildinfo.Version={{ .Version }}
    goos:
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - zip
    files:
      - README.md
      - LICENSE
      - config.example.yaml
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
