log_level: info

coachless:
  api_base_url: https://api.coachless.gg
  timeout_seconds: 20

auth:
  auto_enabled: true
  manual_fallback_enabled: true
  token_skew_seconds: 30

env_file:
  path: ""

secrets:
  service_name: lol-autobuild

recommendation:
  min_occurrence: 1_000
  top_items: 6
  top_spells: 2

lcu:
  enabled: true
  lockfile_path: ""

watch:
  debounce_millis: 500
  reconnect_delay_millis: 1000
